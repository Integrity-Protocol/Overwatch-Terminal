<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Dossier — The Integrity Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #060a11;
  --bg-secondary: #0c1220;
  --bg-card: #101826;
  --bg-inspector: #0a0f1a;
  --border: #1a2740;
  --border-active: #2a3f60;
  --text-primary: #dfe6f0;
  --text-secondary: #8a9bba;
  --text-muted: #44556e;
  --accent: #0077b6;
  --accent-dim: rgba(0,119,182,0.08);
  --accent-green: #00e599;
  --accent-green-dim: rgba(0,229,153,0.08);
  --accent-red: #ff4757;
  --accent-red-dim: rgba(255,71,87,0.08);
  --accent-amber: #ffb347;
  --accent-amber-dim: rgba(255,179,71,0.08);
  --accent-purple: #a78bfa;
  --accent-purple-dim: rgba(167,139,250,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--sans); background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }

.header {
  height: 52px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-brand { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; color: var(--accent); }
.header-title { font-size: 16px; font-weight: 600; }
.header-nav { display: flex; gap: 3px; }
.header-nav a {
  font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  text-decoration: none; padding: 5px 12px; border-radius: var(--radius-sm);
}
.header-nav a:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
.header-nav a.active { color: var(--accent); background: var(--accent-dim); }

.main { display: flex; height: calc(100vh - 52px); }

/* ── Left: Signal Timeline ── */
.timeline-pane {
  width: 400px; min-width: 400px; border-right: 1px solid var(--border);
  overflow-y: auto; background: var(--bg-secondary);
}

/* Signal selector */
.signal-selector {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.signal-selector label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
  color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 6px;
}
.signal-selector select {
  width: 100%; background: var(--bg-card); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 10px; font-family: var(--sans); font-size: 12px;
  cursor: pointer; outline: none;
}
.signal-selector select:focus { border-color: var(--accent); }
.signal-selector select option { background: var(--bg-card); color: var(--text-primary); }

.signal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.signal-header-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.signal-header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.signal-header-meta { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
.signal-header-meta span { color: var(--text-secondary); }

/* Sparkline */
.sparkline-bar {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.sparkline-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
.sparkline-row { display: flex; align-items: flex-end; gap: 3px; height: 32px; }
.spark-bar {
  flex: 1; border-radius: 2px 2px 0 0; min-width: 0; cursor: pointer;
  transition: opacity 0.15s; position: relative;
}
.spark-bar:hover { opacity: 0.8; }
.spark-bar.selected { box-shadow: 0 0 0 1px var(--text-primary); }
.sparkline-range { display: flex; justify-content: space-between; margin-top: 4px; font-family: var(--mono); font-size: 8px; color: var(--text-muted); }

/* Timeline */
.timeline { padding: 16px 20px 40px; position: relative; }
.timeline::before {
  content: ''; position: absolute; left: 30px; top: 16px; bottom: 40px;
  width: 1px; background: var(--border);
}
.tl-node {
  position: relative; padding-left: 44px; margin-bottom: 4px; cursor: pointer;
}
.tl-dot {
  position: absolute; left: 23px; top: 10px;
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--bg-secondary);
  z-index: 2; transition: all 0.2s;
}
.tl-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px; transition: all 0.15s;
}
.tl-node:hover .tl-card { border-color: var(--border-active); }
.tl-node.selected .tl-card { border-color: var(--accent); }
.tl-node.selected .tl-dot { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,119,182,0.3); }
.tl-status {
  font-family: var(--mono); font-size: 8px; font-weight: 600;
  letter-spacing: 0.06em; display: inline-block;
  padding: 2px 6px; border-radius: 2px; margin-bottom: 4px;
}
.st-detected { background: var(--accent-dim); color: var(--accent); }
.st-scored { background: var(--accent-dim); color: var(--accent); }
.st-corrected { background: var(--accent-purple-dim); color: var(--accent-purple); }
.st-escalated { background: var(--accent-red-dim); color: var(--accent-red); }
.st-stripped { background: var(--accent-red-dim); color: var(--accent-red); }
.st-maintained { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
.st-restored { background: var(--accent-green-dim); color: var(--accent-green); }
.st-resolved { background: var(--accent-green-dim); color: var(--accent-green); }
.st-drift { background: var(--accent-amber-dim); color: var(--accent-amber); }
.tl-title { font-size: 11px; color: var(--text-primary); line-height: 1.3; }
.tl-meta { font-family: var(--mono); font-size: 9px; color: var(--text-muted); margin-top: 3px; }
.tl-score-change { font-family: var(--mono); font-size: 9px; margin-top: 2px; }
.score-up { color: var(--accent-red); }
.score-down { color: var(--accent-green); }
.score-same { color: var(--text-muted); }

/* ── Right: Inspector ── */
.inspector-pane { flex: 1; overflow-y: auto; background: var(--bg-inspector); }
.inspector-sticky {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg-inspector); border-bottom: 1px solid var(--border);
  padding: 10px 20px; font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  display: none;
}
.inspector-sticky span { color: var(--text-secondary); margin-left: 6px; }
.inspector-empty {
  display: flex; align-items: center; justify-content: center; height: 100%;
  font-family: var(--mono); font-size: 12px; color: var(--text-muted);
}
.inspector-content { padding: 20px; display: none; }

@keyframes fadeIn { 0% { opacity:0; transform:translateY(4px); } 100% { opacity:1; transform:translateY(0); } }
.inspector-content.show { display: block; animation: fadeIn 0.18s ease-out; }

.insp-section { margin-bottom: 20px; }
.insp-section-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px;
  padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.kv { display: grid; grid-template-columns: 130px 1fr; gap: 5px 12px; }
.kv-k { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }
.kv-v { font-family: var(--mono); font-size: 10px; color: var(--text-secondary); word-break: break-word; }
.kv-v.hi { color: var(--accent); }
.kv-v.red { color: var(--accent-red); }
.kv-v.green { color: var(--accent-green); }
.kv-v.amber { color: var(--accent-amber); }
.kv-v.purple { color: var(--accent-purple); }

/* Diff view */
.diff-block {
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 12px; line-height: 1.7; color: var(--text-secondary);
}
.diff-del {
  background: rgba(255,71,87,0.1); color: var(--accent-red);
  text-decoration: line-through; padding: 1px 3px; border-radius: 2px;
}
.diff-add {
  background: rgba(0,229,153,0.1); color: var(--accent-green);
  padding: 1px 3px; border-radius: 2px;
}
.diff-same { color: var(--text-muted); }

/* Layer journey */
.layer-journey { display: flex; gap: 0; margin-bottom: 16px; }
.layer-step {
  flex: 1; text-align: center; padding: 8px 4px;
  border-bottom: 2px solid var(--border);
  font-family: var(--mono); font-size: 9px; color: var(--text-muted);
  position: relative;
}
.layer-step.active { border-bottom-color: var(--accent); color: var(--accent); }
.layer-step.flagged { border-bottom-color: var(--accent-amber); color: var(--accent-amber); }
.layer-step.stripped { border-bottom-color: var(--accent-red); color: var(--accent-red); }
.layer-step .step-score {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  display: block; margin-top: 2px;
}
.layer-step.stripped .step-score { color: var(--accent-red); text-decoration: line-through; }

/* Corrections applied */
.correction-item {
  background: rgba(167,139,250,0.04); border: 1px solid rgba(167,139,250,0.12);
  border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 6px;
}
.correction-id { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--accent-purple); }
.correction-effect { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Gate violations */
.violation-item {
  border-left: 2px solid var(--accent-amber);
  padding: 6px 10px; margin-bottom: 6px;
  background: rgba(255,179,71,0.03);
}
.violation-rule { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--accent-amber); }
.violation-text { font-size: 11px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
.violation-severity { font-family: var(--mono); font-size: 8px; color: var(--text-muted); float: right; }

/* Evidence changed badge */
.evidence-badge {
  display: inline-block; font-family: var(--mono); font-size: 8px; font-weight: 600;
  padding: 2px 6px; border-radius: 2px; margin-left: 8px;
}
.evidence-badge.changed { background: var(--accent-green-dim); color: var(--accent-green); }
.evidence-badge.unchanged { background: var(--accent-amber-dim); color: var(--accent-amber); }

/* Loading state */
.loading-msg {
  display: flex; align-items: center; justify-content: center; height: 200px;
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-brand">THE INTEGRITY PROTOCOL</div>
    <div class="header-title">Signal Dossier</div>
  </div>
  <div class="header-nav">
    <a href="index.html">DASHBOARD</a>
    <a href="trace.html">TRACE</a>
    <a href="flight-recorder.html">FLIGHT RECORDER</a>
    <a href="signal-dossier.html" class="active">DOSSIER</a>
  </div>
</div>

<div class="main">
  <div class="timeline-pane">
    <div class="signal-selector">
      <label>SELECT SIGNAL LINEAGE</label>
      <select id="lineageSelect" onchange="selectLineage(this.value)">
        <option value="">Loading...</option>
      </select>
    </div>
    <div class="signal-header">
      <div class="signal-header-label">SIGNAL DOSSIER</div>
      <div class="signal-header-name" id="sigName">—</div>
      <div class="signal-header-meta">
        category: <span id="sigCategory">—</span> · <span id="runCount">0</span> appearances
      </div>
    </div>
    <div class="sparkline-bar">
      <div class="sparkline-label">WEIGHTED SEVERITY ACROSS RUNS</div>
      <div class="sparkline-row" id="sparkline"></div>
      <div class="sparkline-range"><span id="sparkFirst"></span><span id="sparkLast"></span></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="inspector-pane" id="inspectorPane">
    <div class="inspector-sticky" id="inspSticky">INSPECTOR //<span id="stickyLabel"></span></div>
    <div class="inspector-empty" id="inspEmpty">Select a run to inspect</div>
    <div class="inspector-content" id="inspContent"></div>
  </div>
</div>

<script>
// ─── Data ──────────────────────────────────────────────────────────
let dossierData = null;
let currentLineage = null;
let selectedRun = null;

// ─── Helpers ───────────────────────────────────────────────────────

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getUTCMonth()]} ${d.getUTCDate()} ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}

/**
 * Derive a tactical status verb from the appearance data.
 * DETECTED (first), ESCALATED (severity up), CORRECTED (corrections fired),
 * MAINTAINED (steady), STRIPPED (rejected by L4), RESTORED (was stripped, now back)
 */
function deriveStatus(app, prev) {
  if (!prev) return { status: 'DETECTED', cls: 'st-detected' };
  if (app.rejected) return { status: 'STRIPPED', cls: 'st-stripped' };
  if (prev.rejected && !app.rejected) return { status: 'RESTORED', cls: 'st-restored' };
  if (app.corrections_applied && app.corrections_applied.length > 0) return { status: 'CORRECTED', cls: 'st-corrected' };

  const prevSev = prev.weighted_severity || 0;
  const curSev = app.weighted_severity || 0;
  if (curSev - prevSev >= 1.5) return { status: 'ESCALATED', cls: 'st-escalated' };
  if (prevSev - curSev >= 1.5) return { status: 'DE-ESCALATED', cls: 'st-resolved' };

  // Check for evidence change without assessment change — potential drift indicator
  if (app.evidence_changed === false && Math.abs(curSev - prevSev) > 0.5) {
    return { status: 'DRIFT?', cls: 'st-drift' };
  }

  return { status: 'MAINTAINED', cls: 'st-maintained' };
}

/**
 * Render a pre-computed diffWords array as HTML.
 */
function renderDiffArray(diffArr) {
  if (!diffArr || !Array.isArray(diffArr)) return '';
  return diffArr.map(part => {
    if (part.removed) return `<span class="diff-del">${escHtml(part.value)}</span>`;
    if (part.added) return `<span class="diff-add">${escHtml(part.value)}</span>`;
    return `<span class="diff-same">${escHtml(part.value)}</span>`;
  }).join('');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Load Data ─────────────────────────────────────────────────────

async function loadDossierData() {
  try {
    const resp = await fetch('data/signal-dossier-data.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    dossierData = await resp.json();
    populateSelector();
  } catch (e) {
    document.getElementById('sigName').textContent = 'Failed to load dossier data';
    document.getElementById('timeline').innerHTML = `<div class="loading-msg">Error: ${e.message}. Run assemble-signal-dossiers.js to generate.</div>`;
  }
}

function populateSelector() {
  const sel = document.getElementById('lineageSelect');
  sel.innerHTML = '<option value="">— Select a signal —</option>';

  // Group by category
  const byCategory = {};
  for (const l of dossierData.lineages) {
    const cat = l.category || 'unknown';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(l);
  }

  // Sort categories alphabetically, lineages by appearance count desc within each
  const cats = Object.keys(byCategory).sort();
  for (const cat of cats) {
    const group = document.createElement('optgroup');
    group.label = cat.toUpperCase() + ` (${byCategory[cat].length})`;
    byCategory[cat]
      .sort((a, b) => b.appearance_count - a.appearance_count)
      .forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.lineage_id;
        opt.textContent = `${l.canonical_name} (${l.appearance_count}x)`;
        group.appendChild(opt);
      });
    sel.appendChild(group);
  }

  // Auto-select the first lineage with most appearances
  if (dossierData.lineages.length > 0) {
    const top = dossierData.lineages[0];
    sel.value = top.lineage_id;
    selectLineage(top.lineage_id);
  }
}

// ─── Select & Render ───────────────────────────────────────────────

function selectLineage(lineageId) {
  if (!dossierData || !lineageId) return;
  currentLineage = dossierData.lineages.find(l => l.lineage_id === lineageId);
  if (!currentLineage) return;

  selectedRun = null;

  // Update header
  document.getElementById('sigName').textContent = currentLineage.canonical_name;
  document.getElementById('sigCategory').textContent = currentLineage.category;
  document.getElementById('runCount').textContent = currentLineage.appearance_count;

  // Reset inspector
  document.getElementById('inspSticky').style.display = 'none';
  document.getElementById('inspEmpty').style.display = 'flex';
  document.getElementById('inspContent').className = 'inspector-content';

  renderSparkline();
  renderTimeline();
}

function renderSparkline() {
  const el = document.getElementById('sparkline');
  if (!currentLineage) { el.innerHTML = ''; return; }
  const apps = currentLineage.appearances;
  const maxSev = 10;

  el.innerHTML = apps.map((a, i) => {
    const sev = a.weighted_severity || a.severity || 0;
    const h = Math.max(4, (sev / maxSev) * 32);
    const prev = i > 0 ? apps[i - 1] : null;
    const { status } = deriveStatus(a, prev);
    const color = status === 'ESCALATED' ? 'var(--accent-red)' :
                  status === 'CORRECTED' ? 'var(--accent-purple)' :
                  status === 'STRIPPED' ? 'var(--accent-red)' :
                  status === 'DRIFT?' ? 'var(--accent-amber)' :
                  status === 'DETECTED' ? 'var(--accent)' :
                  'var(--text-muted)';
    return `<div class="spark-bar" data-run="${i}" onclick="selectRun(${i})" style="height:${h}px;background:${color};" title="${fmtDate(a.run_timestamp)}: ${sev}"></div>`;
  }).join('');

  document.getElementById('sparkFirst').textContent = fmtDate(apps[0]?.run_timestamp);
  document.getElementById('sparkLast').textContent = fmtDate(apps[apps.length - 1]?.run_timestamp);
}

function renderTimeline() {
  const el = document.getElementById('timeline');
  if (!currentLineage) { el.innerHTML = ''; return; }
  const apps = currentLineage.appearances;

  el.innerHTML = apps.map((a, i) => {
    const prev = i > 0 ? apps[i - 1] : null;
    const { status, cls } = deriveStatus(a, prev);
    const sev = a.weighted_severity || a.severity || 0;
    const prevSev = prev ? (prev.weighted_severity || prev.severity || 0) : null;

    let scoreChange = '';
    if (prevSev !== null) {
      const delta = sev - prevSev;
      if (delta > 0) scoreChange = `<div class="tl-score-change score-up">▲ ${sev} (+${delta.toFixed(1)})</div>`;
      else if (delta < 0) scoreChange = `<div class="tl-score-change score-down">▼ ${sev} (${delta.toFixed(1)})</div>`;
      else scoreChange = `<div class="tl-score-change score-same">— ${sev}</div>`;
    } else {
      scoreChange = `<div class="tl-score-change" style="color:var(--text-secondary);">● ${sev}</div>`;
    }

    // Build title from signal description
    const title = (a.l1_evidence || '').slice(0, 80) || 'No L1 evidence';

    return `<div class="tl-node" data-run="${i}" onclick="selectRun(${i})">
      <div class="tl-dot"></div>
      <div class="tl-card">
        <span class="tl-status ${cls}">${status}</span>
        ${scoreChange}
        <div class="tl-title">${escHtml(title)}${title.length >= 80 ? '…' : ''}</div>
        <div class="tl-meta">${fmtDate(a.run_timestamp)} · ${a.outcome || '—'}</div>
      </div>
    </div>`;
  }).join('');
}

function selectRun(idx) {
  if (!currentLineage) return;
  selectedRun = idx;
  const a = currentLineage.appearances[idx];
  const prev = idx > 0 ? currentLineage.appearances[idx - 1] : null;
  const { status } = deriveStatus(a, prev);

  document.querySelectorAll('.tl-node').forEach(n => n.classList.remove('selected'));
  const node = document.querySelector(`[data-run="${idx}"]`);
  if (node) node.classList.add('selected');
  document.querySelectorAll('.spark-bar').forEach(b => b.classList.remove('selected'));
  const bar = document.querySelector(`.spark-bar[data-run="${idx}"]`);
  if (bar) bar.classList.add('selected');

  const sticky = document.getElementById('inspSticky');
  sticky.style.display = 'block';
  document.getElementById('stickyLabel').textContent = `${fmtDate(a.run_timestamp)} — ${status}`;

  document.getElementById('inspEmpty').style.display = 'none';
  const content = document.getElementById('inspContent');
  content.className = 'inspector-content show';

  let html = '';

  // Layer journey bar
  const rawSev = a.severity || '—';
  const wSev = a.weighted_severity || '—';
  const finalComp = a.final_composite || wSev;
  const layers = [
    { label: 'SWEEP', score: rawSev, state: 'active' },
    { label: 'CONTEXT', score: wSev, state: (a.corrections_applied && a.corrections_applied.length > 0) ? 'flagged' : 'active' },
    { label: 'INFER', score: '—', state: 'active' },
    { label: 'RECONCILE', score: finalComp, state: a.rejected ? 'stripped' : 'active' }
  ];
  html += '<div class="layer-journey">';
  layers.forEach(l => {
    html += `<div class="layer-step ${l.state}">
      ${l.label}
      <span class="step-score">${l.score}</span>
    </div>`;
  });
  html += '</div>';

  // Diff section (if not first run and reasoning_diff exists)
  if (a.reasoning_diff && Array.isArray(a.reasoning_diff) && a.reasoning_diff.length > 0) {
    const evidenceBadge = a.evidence_changed === true
      ? '<span class="evidence-badge changed">EVIDENCE CHANGED</span>'
      : a.evidence_changed === false
      ? '<span class="evidence-badge unchanged">EVIDENCE UNCHANGED</span>'
      : '';
    html += `<div class="insp-section">
      <div class="insp-section-title">WHAT CHANGED FROM PREVIOUS RUN ${evidenceBadge}</div>
      <div class="diff-block">${renderDiffArray(a.reasoning_diff)}</div>
    </div>`;
  }

  // KV details
  html += `<div class="insp-section">
    <div class="insp-section-title">RUN DETAILS</div>
    <div class="kv">
      <div class="kv-k">run_timestamp</div><div class="kv-v hi">${a.run_timestamp}</div>
      <div class="kv-k">signal_ids</div><div class="kv-v hi">${(a.signal_ids || []).join(', ') || '—'}</div>
      <div class="kv-k">severity</div><div class="kv-v">${a.severity || '—'} / 10</div>
      <div class="kv-k">weighted_severity</div><div class="kv-v">${a.weighted_severity || '—'}</div>
      <div class="kv-k">confidence</div><div class="kv-v ${a.confidence === 'HIGH' ? '' : a.confidence === 'LOW' ? 'amber' : ''}">${a.confidence || '—'}</div>
      <div class="kv-k">source_tier</div><div class="kv-v">${a.source_tier || '—'}</div>
      <div class="kv-k">outcome</div><div class="kv-v">${a.outcome || '—'}</div>
      <div class="kv-k">evidence_changed</div><div class="kv-v ${a.evidence_changed === false ? 'amber' : a.evidence_changed === true ? 'green' : ''}">${a.evidence_changed === null ? 'first appearance' : a.evidence_changed}</div>
      <div class="kv-k">acquisition</div><div class="kv-v">${a.acquisition_source || 'none'} ${a.acquisition_survival ? '→ ' + a.acquisition_survival : ''}</div>
    </div>
  </div>`;

  // L1 Evidence
  if (a.l1_evidence) {
    html += `<div class="insp-section">
      <div class="insp-section-title">LAYER 1 — SWEEP (RAW EVIDENCE)</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${escHtml(a.l1_evidence)}</div>
    </div>`;
  }

  // L2 Reasoning
  if (a.l2_reasoning) {
    html += `<div class="insp-section">
      <div class="insp-section-title">LAYER 2 — CONTEXTUALIZE</div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${escHtml(a.l2_reasoning)}</div>
    </div>`;
  }

  // Corrections
  if (a.corrections_applied && a.corrections_applied.length > 0) {
    html += `<div class="insp-section">
      <div class="insp-section-title">CORRECTIONS APPLIED</div>
      ${a.corrections_applied.map(id => `<div class="correction-item">
        <div class="correction-id">${escHtml(id)}</div>
      </div>`).join('')}
    </div>`;
  }

  // Gate violations summary
  if (a.gate_violations_by_layer) {
    const gv = a.gate_violations_by_layer;
    const total = (gv.L1 || 0) + (gv.L2 || 0) + (gv.L3 || 0) + (gv.L4 || 0);
    if (total > 0) {
      html += `<div class="insp-section">
        <div class="insp-section-title">GATE VIOLATIONS (${total})</div>
        <div class="kv">
          <div class="kv-k">L1 SWEEP</div><div class="kv-v ${gv.L1 > 0 ? 'amber' : ''}">${gv.L1 || 0}</div>
          <div class="kv-k">L2 CONTEXT</div><div class="kv-v ${gv.L2 > 0 ? 'amber' : ''}">${gv.L2 || 0}</div>
          <div class="kv-k">L3 INFER</div><div class="kv-v ${gv.L3 > 0 ? 'amber' : ''}">${gv.L3 || 0}</div>
          <div class="kv-k">L4 RECONCILE</div><div class="kv-v ${gv.L4 > 0 ? 'amber' : ''}">${gv.L4 || 0}</div>
        </div>
      </div>`;
    }
  }

  // Calibration active
  if (a.injected_calibration) {
    const cal = a.injected_calibration;
    const entries = [...(cal.L1 || []), ...(cal.L2 || []), ...(cal.L3 || []), ...(cal.L4 || [])];
    if (entries.length > 0) {
      html += `<div class="insp-section">
        <div class="insp-section-title">CALIBRATION ACTIVE</div>
        <div class="kv">
          ${cal.L1 && cal.L1.length > 0 ? `<div class="kv-k">L1</div><div class="kv-v purple">${cal.L1.join(', ')}</div>` : ''}
          ${cal.L2 && cal.L2.length > 0 ? `<div class="kv-k">L2</div><div class="kv-v purple">${cal.L2.join(', ')}</div>` : ''}
          ${cal.L3 && cal.L3.length > 0 ? `<div class="kv-k">L3</div><div class="kv-v purple">${cal.L3.join(', ')}</div>` : ''}
          ${cal.L4 && cal.L4.length > 0 ? `<div class="kv-k">L4</div><div class="kv-v purple">${cal.L4.join(', ')}</div>` : ''}
        </div>
      </div>`;
    }
  }

  content.innerHTML = html;
  document.getElementById('inspectorPane').scrollTop = 0;
}

// ─── Init ──────────────────────────────────────────────────────────
loadDossierData();
</script>
</body>
</html>
